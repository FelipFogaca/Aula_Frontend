<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Cadastro Pet</title>
</head>

<body>
    <h1>Cadastro de Pets</h1>

    <!-- Form Principal -->
    <form id="formCadastro">
        <fieldset>
            <legend>Dados do Pet</legend>

            <label for="pet">Nome:</label>
            <input type="text" id="pet" name="pet" autocomplete="off">
            <br>

            <label for="idade">Idade:</label>
            <input type="number" name="idade" id="idade" min="0" step="1">
        </fieldset>

        <fieldset>
            <legend>Dados do Tutor</legend>

            <label for="tutor">Nome:</label>
            <input type="text" id="tutor" name="tutor" autocomplete="off">
            <br>
        </fieldset>

        <button type="submit">Cadastrar</button>
        <button type="button" id="btnLimparLista">Limpar Lista</button>

    </form>

    <!-- Edição -->
    <section id="editBox" aria-hidden="true">
        <header>
            <strong>Alteração</strong>
            <button type="button" id="btnFecharEdicao" aria-label="Fechar Edição">X</button>
        </header>

        <form id="formEdit">
            <label for="editNome">Nome:</label>
            <input type="text" id="editNome">
            <br>

            <label for="editIdade">Idade:</label>
            <input type="number" id="editIdade" min="0" step="1">
            <br>

            <label for="editTutor">Tutor:</label>
            <input type="text" id="editTutor">
            <br>
            <br>

            <button type="submit">Salvar</button>
        </form>

    </section>

    <p id="counter"></p>

    <table aria-label="Tabelas de pets cadastrados">

        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Tutor</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="pets"></tbody>

    </table>

    <script src="js/script.js"></script>
</body>

</html>
