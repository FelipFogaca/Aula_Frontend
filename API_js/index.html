<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="CSS/style.css">

    <title>Busca CEP</title>
</head>

<body>

    <main class="container">

        <h1 class="title"><b>Busca CEP</b></h1>

        <div class="row">

            <div class="inputbox">
                <input type="text" id="cep" required>
                <label for="cep">CEP</label>
            </div>

            <div class="inputbox">
                <input type="text" id="endereco" required>
                <label for="endereco">Endereço</label>
            </div>

            <div class="inputbox">
                <input type="text" id="bairro" required>
                <label for="bairro">Bairro</label>
            </div>

            <div class="inputbox">
                <input type="text" id="cidade" required>
                <label for="cidade">Cidade</label>
            </div>

            <div class="inputbox">
                <input type="text" id="estado" required>
                <label for="estado">Estado</label>
            </div>

        </div>

        <div class="buttons">
            <button id="btnBuscar">Buscar</button>
            <button id="btnLimpar">Limpar</button>
        </div>

        <table>

            <thead>
                <tr>
                    <th style="color: #222118;"><b>CEP</b></th>
                    <th style="color: #222118;"><b>Endereço</b></th>
                    <th style="color: #222118;"><b>Bairro</b></th>
                    <th style="color: #222118;"><b>Cidade</b></th>
                    <th style="color: #222118;"><b>Estado</b></th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="historico"></tbody>

        </table>

    </main>

    <script src="JS/script.js"></script>

</body>

</html>
